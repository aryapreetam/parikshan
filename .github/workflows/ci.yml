name: Reusable CI (lint, build+tests, android UI)

on:
  workflow_call:

permissions:
  contents: read

env:
  JAVA_VERSION: '21'

jobs:
  lint:
    name: Lint and code style
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Cache Gradle Wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper/dists
          key: gradle-wrapper-${{ runner.os }}-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-wrapper-${{ runner.os }}-
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Check code style (lint)
        run: ./gradlew lintRelease

  unit-tests:
    name: Unit Tests (${{ matrix.target }})
    needs: [ lint ]
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: jvm
            os: ubuntu-latest
          - target: ios
            os: macos-latest
          - target: wasm
            os: ubuntu-latest
          - target: android
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Cache Gradle Wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper/dists
          key: gradle-wrapper-${{ runner.os }}-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-wrapper-${{ runner.os }}-
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Run unit tests
        shell: bash
        run: |
          set -e
          case "${{ matrix.target }}" in
            jvm)
              ./gradlew :parikshan-server:test :parikshan-core:jvmTest :parikshan-client:jvmTest :sample:composeApp:jvmTest
              ;;
            ios)
              ./gradlew :parikshan-core:iosSimulatorArm64Test :parikshan-client:iosSimulatorArm64Test :sample:composeApp:iosSimulatorArm64Test
              ;;
            wasm)
              ./gradlew :parikshan-core:wasmJsBrowserTest :parikshan-client:wasmJsBrowserTest :sample:composeApp:wasmJsBrowserTest
              ;;
            android)
              ./gradlew :parikshan-client:testAndroid :sample:androidApp:testDebugUnitTest
              ;;
          esac

  e2e-android:
    name: E2E Android (emulator)
    runs-on: ubuntu-latest
    needs: [ unit-tests ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Run Parikshan Android E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew :sample:androidApp:e2eAndroidTest --no-configuration-cache

  e2e-desktop:
    name: E2E Desktop
    runs-on: ubuntu-latest
    needs: [ unit-tests ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Run Parikshan Desktop E2E tests
        run: ./gradlew :sample:composeApp:e2eDesktopTest --no-configuration-cache

  e2e-wasm:
    name: E2E Wasm
    runs-on: ubuntu-latest
    needs: [ unit-tests ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Run Parikshan Wasm E2E tests
        run: ./gradlew :sample:composeApp:e2eWasmTest --no-configuration-cache

  e2e-ios:
    name: E2E iOS (Simulator)
    runs-on: macos-latest
    needs: [ unit-tests ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Run Parikshan iOS E2E tests
        run: |
          # The plugin handles simulator booting and xcodebuild internally
          ./gradlew :sample:composeApp:e2eIosTest --no-configuration-cache
