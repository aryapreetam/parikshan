name: Publish Multiplatform Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  pages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'

jobs:
  # Reuse CI (lint + tests + e2e dogfooding)
  ci:
    name: CI (lint, build+tests, 4-pillar e2e)
    uses: ./.github/workflows/ci.yml

  # Build artifacts in parallel after all tests succeed
  build-linux:
    name: Build Android APK and wasm (Ubuntu)
    runs-on: ubuntu-latest
    needs: [ ci ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Setup Node.js (for wasm build)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build APK and wasm
        run: |
          ./gradlew :sample:androidApp:assembleRelease
          ./gradlew :sample:composeApp:wasmJsBrowserDistribution
      - name: Collect artifacts (APK + wasm)
        run: |
          mkdir -p $GITHUB_WORKSPACE/release-upload
          APK_SRC=$(find sample/androidApp/build/outputs/apk -type f -name '*-release-*.apk' | head -n1)
          if [ -n "$APK_SRC" ]; then
            cp "$APK_SRC" "$GITHUB_WORKSPACE/release-upload/sample-app-android-unsigned.apk"
          fi
          WASM_DIR="$GITHUB_WORKSPACE/sample/composeApp/build/dist/wasmJs/productionExecutable"
          if [ -d "$WASM_DIR" ]; then
            (cd "$WASM_DIR" && zip -r "$GITHUB_WORKSPACE/release-upload/sample-app-wasm.zip" ./*)
          fi
      - name: Upload artifacts (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: release-upload-linux
          path: ${{ github.workspace }}/release-upload/*
          compression-level: 1

  build-macos:
    name: Build sample DMG artifacts (macOS variants)
    strategy:
      fail-fast: true
      matrix:
        arch: [ x64, aarch64 ]
    runs-on: macos-latest
    needs: [ ci ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
          architecture: ${{ matrix.arch }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build Desktop DMG
        run: ./gradlew :sample:composeApp:packageDmg
      - name: Collect DMG artifacts
        run: |
          mkdir -p $GITHUB_WORKSPACE/release-upload
          ARCH_SUFFIX="${{ matrix.arch }}"
          DMG_SRC=$(find sample/composeApp/build/compose/binaries -type f -name '*.dmg' | head -n1)
          if [ -n "$DMG_SRC" ]; then
            cp "$DMG_SRC" "$GITHUB_WORKSPACE/release-upload/sample-app-desktop-$ARCH_SUFFIX.dmg"
          fi
      - name: Upload artifacts (macOS ${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: release-upload-${{ matrix.arch }}
          path: ${{ github.workspace }}/release-upload/*

  build-windows:
    name: Build Windows MSI
    runs-on: windows-latest
    needs: [ ci ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build Windows MSI
        run: ./gradlew :sample:composeApp:packageMsi
      - name: Collect MSI artifacts
        shell: bash
        run: |
          mkdir -p $GITHUB_WORKSPACE/release-upload
          MSI_SRC=$(find sample/composeApp/build/compose/binaries/main/msi -type f -name '*.msi' | head -n1)
          if [ -n "$MSI_SRC" ]; then
            cp "$MSI_SRC" "$GITHUB_WORKSPACE/release-upload/sample-app-windows.msi"
          fi
      - name: Upload artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: release-upload-windows
          path: ${{ github.workspace }}/release-upload/*

  publish-library:
    name: Publish Library & Plugin
    runs-on: macos-latest
    needs: [ build-linux, build-macos, build-windows ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Publish to MavenCentral
        run: ./gradlew :parikshan:publishAndReleaseToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}
      - name: Publish to Gradle Plugin Portal
        run: ./gradlew :parikshan-gradle-plugin:publishPlugins --no-configuration-cache
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [ publish-library ]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            all-artifacts/sample-app-android-unsigned.apk
            all-artifacts/sample-app-desktop-x64.dmg
            all-artifacts/sample-app-desktop-aarch64.dmg
            all-artifacts/sample-app-windows.msi
            all-artifacts/sample-app-wasm.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-site:
    name: Deploy GitHub Pages (Landing, API, Demo)
    runs-on: ubuntu-latest
    needs: [ publish-library ]
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 1. Build Site Root (Docsify from README)
      - name: Prepare Site Root
        run: |
          mkdir -p site
          cat > site/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>parikshan</title>
          <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
          </head>
          <body>
          <div id="app"></div>
          <script type="module">
          import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
          mermaid.initialize({ startOnLoad: false, theme: 'default' });
          window.$docsify = {
            name: 'parikshan',
            repo: 'https://github.com/aryapreetam/parikshan',
            homepage: 'README.MD',
            loadSidebar: false,
            loadNavbar: false,
            coverpage: false,
            plugins: [
              function(hook, vm) {
                hook.doneEach(function() {
                  mermaid.run({ querySelector: '.mermaid' });
                });
              }
            ]
          }
          </script>
          <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
          <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0"></script>
          </body>
          </html>
          EOF
          cp README.MD site/
          cp CONTRIBUTING.md site/
          cp -r readme_images site/ || true
          cp -r docs site/ || true

      # 2. Add API Reference (Dokka)
      - name: Generate API Docs
        run: ./gradlew :parikshan:dokkaGeneratePublicationHtml
      - name: Prepare API Docs
        run: |
          mkdir -p site/api
          cp -r parikshan/build/dokka/html/* site/api/

      # 3. Add Demo Site (Wasm)
      - name: Build Wasm Demo
        run: ./gradlew :sample:composeApp:wasmJsBrowserDistribution
      - name: Prepare Demo Site
        run: |
          mkdir -p site/demo
          cp -r sample/composeApp/build/dist/wasmJs/productionExecutable/* site/demo/

      # 4. Deploy to GitHub Pages
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
